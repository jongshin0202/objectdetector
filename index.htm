<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>AI Touch Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        
        /* Full Screen Camera */
        #video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        
        /* Invisible Touch Layer */
        #touch-layer { position: absolute; top: 0; left: 0; width: 100%; height: 75%; z-index: 5; background: transparent; }
        
        /* Result Text */
        #label-container { position: absolute; top: 10%; width: 100%; text-align: center; color: #00ff00; font-size: 40px; font-weight: bold; z-index: 10; text-shadow: 2px 2px 10px #000; pointer-events: none; }
        
        /* Bottom Control Panel */
        .bottom-panel { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); z-index: 20; padding: 20px 0; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        
        .slider-box { width: 80%; text-align: center; }
        input[type=range] { width: 100%; height: 25px; cursor: pointer; }
        
        button { padding: 15px 30px; font-size: 16px; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; }
        #startBtn { background: #00ff00; color: black; padding: 25px 60px; font-size: 22px; }
        #switchBtn { background: #444; color: white; display: none; }
    </style>
</head>
<body>

    <div id="label-container">TAP START</div>
    <video id="video" autoplay playsinline muted></video>
    <div id="touch-layer" onclick="handleTouch()"></div>
    
    <div class="bottom-panel">
        <div id="controls" style="display:none; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px;">
            <button id="switchBtn" onclick="switchCamera()">SWITCH CAMERA</button>
            <div class="slider-box">
                <label>Sensitivity: <span id="sVal">50</span>%</label>
                <input type="range" id="sens" min="1" max="99" value="50" oninput="document.getElementById('sVal').innerText=this.value">
            </div>
        </div>
        <button id="startBtn" onclick="initApp()">START CAMERA</button>
    </div>

    <script>
        let model, stream, facing = 'environment';
        const video = document.getElementById('video');
        const label = document.getElementById('label-container');

        async function initApp() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('controls').style.display = 'flex';
            label.innerText = "LOADING...";
            model = await mobilenet.load();
            await startCam();
            label.innerText = "TOUCH TO DETECT";
        }

        async function startCam() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: facing } }
                }).catch(() => navigator.mediaDevices.getUserMedia({ video: true }));
                video.srcObject = stream;
                video.onloadedmetadata = () => { video.play(); document.getElementById('switchBtn').style.display = 'block'; };
            } catch (e) { alert("Camera Error"); }
        }

        function switchCamera() {
            facing = (facing === 'environment') ? 'user' : 'environment';
            startCam();
        }

        async function handleTouch() {
            if (!model) return;
            
            // 1. Vibrate phone
            if (navigator.vibrate) navigator.vibrate(80);

            // 2. Predict
            const predictions = await model.classify(video);
            const threshold = document.getElementById('sens').value / 100;

            if (predictions.length > 0 && predictions[0].probability >= threshold) {
                const text = predictions[0].className.split(',')[0].toUpperCase();
                label.innerText = text;
                
                // 3. Voice Output
                const speech = new SpeechSynthesisUtterance(text);
                window.speechSynthesis.speak(speech);
            } else {
                label.innerText = "NOT SURE...";
            }
        }
    </script>
</body>
</html>
