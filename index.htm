<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High-Accuracy AI Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #video { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; }
        #label-container { 
            position: absolute; top: 5%; width: 100%; text-align: center; 
            color: #00ff00; font-size: 32px; font-weight: bold; z-index: 10; 
            text-shadow: 2px 2px 10px #000; background: rgba(0,0,0,0.5); padding: 20px 0;
        }
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 8px; z-index: 100; }
        .btn { padding: 15px 20px; font-size: 14px; background: #00ff00; color: #000; border: none; border-radius: 50px; font-weight: bold; }
        #debug { position: absolute; bottom: 5px; width: 100%; text-align: center; font-size: 12px; color: #888; z-index: 10; }
    </style>
</head>
<body>
    <div id="label-container">STANDBY</div>
    <video id="video" autoplay playsinline muted></video>
    
    <div id="controls">
        <button class="btn" id="startBtn" onclick="init()">START ACCURATE AI</button>
        <button class="btn" id="saveBtn" onclick="savePhoto()" style="display:none;">📷 SAVE</button>
        <button class="btn" id="speakBtn" onclick="toggleSpeech()" style="display:none;">🔊 OFF</button>
    </div>

    <div id="debug">Status: <span id="log-text">Ready.</span></div>

    <script>
        const log = (msg) => document.getElementById('log-text').innerText = msg;
        const label = document.getElementById('label-container');
        const video = document.getElementById('video');
        let model, speechEnabled = false, lastAnnounced = "";
        
        // BUFFER FOR SMOOTHING
        let predictionBuffer = [];
        const BUFFER_SIZE = 12; 

        async function init() {
            document.getElementById('startBtn').style.display = 'none';
            try {
                log("Loading High-Accuracy Model...");
                label.innerText = "LOADING...";
                // Version 2, Alpha 1.0 is the most "ResNet-like" in accuracy
                model = await mobilenet.load({ version: 2, alpha: 1.0 });
                
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                video.srcObject = stream;
                
                document.getElementById('saveBtn').style.display = 'block';
                document.getElementById('speakBtn').style.display = 'block';
                log("Expert AI Online!");
                predict();
            } catch (e) {
                log("Error: " + e.message);
                document.getElementById('startBtn').style.display = 'block';
            }
        }

        async function predict() {
            if (model && video.readyState === 4) {
                const res = await model.classify(video);
                if (res.length > 0) {
                    const topResult = res[0];
                    
                    // Only process if confidence is > 25%
                    if (topResult.probability > 0.25) {
                        predictionBuffer.push(topResult.className.split(',')[0]);
                        if (predictionBuffer.length > BUFFER_SIZE) predictionBuffer.shift();

                        // Find the most frequent guess in the buffer (Mode)
                        const mostFrequent = predictionBuffer.reduce((a, b, i, arr) => 
                            (arr.filter(v => v === a).length >= arr.filter(v => v === b).length ? a : b)
                        );

                        const confidence = Math.round(topResult.probability * 100);
                        label.innerText = `${mostFrequent.toUpperCase()} (${confidence}%)`;

                        if (speechEnabled && mostFrequent !== lastAnnounced && confidence > 50) {
                            const msg = new SpeechSynthesisUtterance(mostFrequent);
                            window.speechSynthesis.cancel();
                            window.speechSynthesis.speak(msg);
                            lastAnnounced = mostFrequent;
                        }
                    } else {
                        label.innerText = "ANALYZING...";
                    }
                }
            }
            requestAnimationFrame(predict);
        }

        function toggleSpeech() {
            speechEnabled = !speechEnabled;
            document.getElementById('speakBtn').innerText = speechEnabled ? "🔊 ON" : "🔊 OFF";
        }

        function savePhoto() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const a = document.createElement('a');
            a.href = canvas.toDataURL('image/png');
            a.download = `detection_${label.innerText.split(' ')[0]}.png`;
            a.click();
        }
    </script>
</body>
</html>
