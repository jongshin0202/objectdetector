<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>AI Precision Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; display: flex; flex-direction: column; }
        
        /* Start Screen - Centered */
        #init-screen { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; }
        #startBtn { padding: 25px 40px; font-size: 22px; font-weight: bold; background: #00ff00; border: none; border-radius: 50px; color: #000; cursor: pointer; }

        /* Main Viewport */
        #viewport { position: relative; flex-grow: 1; width: 100%; overflow: hidden; background: #111; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        #canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        #touch-zone { position: absolute; inset: 0; z-index: 10; }
        
        #label-container { position: absolute; top: 10%; width: 100%; text-align: center; color: #00ff00; font-size: 34px; font-weight: bold; z-index: 15; text-shadow: 2px 2px 10px #000; pointer-events: none; }

        /* Controls Panel - Forced Visibility */
        #controls { background: #222; padding: 15px; z-index: 20; display: none; flex-direction: column; align-items: center; gap: 10px; border-top: 2px solid #444; }
        .btn-row { display: flex; gap: 10px; width: 90%; justify-content: center; }
        button { padding: 12px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; flex: 1; }
        #saveBtn { background: #007bff; color: white; }
        #switchBtn { background: #fff; color: #000; }
        
        .slider-box { width: 90%; color: #00ff00; font-weight: bold; text-align: center; }
        input[type=range] { width: 100%; height: 40px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="init-screen">
        <button id="startBtn" onclick="initApp()">Start Object Detection</button>
    </div>

    <div id="viewport">
        <div id="label-container">INITIALIZING...</div>
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <div id="touch-zone"></div>
    </div>
    
    <div id="controls">
        <div class="btn-row">
            <button id="switchBtn" onclick="switchCamera()">SWITCH CAMERA</button>
            <button id="saveBtn" onclick="savePhoto()">SAVE PHOTO</button>
        </div>
        <div class="slider-box">
            SENSITIVITY: <span id="sVal">50</span>%
            <input type="range" id="sens" min="1" max="99" value="50" oninput="document.getElementById('sVal').innerText=this.value">
        </div>
    </div>

    <script>
        let model, stream, facing = 'environment', lastPredictions = [];
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const label = document.getElementById('label-container');

        async function initApp() {
            document.getElementById('init-screen').style.display = 'none';
            document.getElementById('controls').style.display = 'flex';
            label.innerText = "LOADING AI...";
            model = await cocoSsd.load();
            await startCam();
            document.getElementById('touch-zone').addEventListener('touchstart', handleTouch);
            renderLoop();
        }

        async function startCam() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            // Force environment (rear) camera
            const constraints = { video: { facingMode: { ideal: "environment" } } };
            try {
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    // Set canvas resolution to match display size
                    canvas.width = canvas.clientWidth;
                    canvas.height = canvas.clientHeight;
                };
            } catch(e) { alert("Camera Error: Check Permissions"); }
        }

        function switchCamera() {
            facing = (facing === 'environment') ? 'user' : 'environment';
            startCam();
        }

        function getCoords(bbox) {
            const [x, y, w, h] = bbox;
            const vW = video.videoWidth, vH = video.videoHeight;
            const cW = canvas.width, cH = canvas.height;
            const vR = vW / vH, cR = cW / cH;
            let xO = 0, yO = 0, rW = cW, rH = cH;
            if (vR > cR) { rW = cH * vR; xO = (cW - rW) / 2; } 
            else { rH = cW / vR; yO = (cH - rH) / 2; }
            return { x: (x / vW) * rW + xO, y: (y / vH) * rH + yO, w: (w / vW) * rW, h: (h / vH) * rH };
        }

        async function renderLoop() {
            if (model && video.readyState === 4) {
                lastPredictions = await model.detect(video);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                let centerObject = "";
                const cX = canvas.width / 2, cY = canvas.height / 2;

                lastPredictions.forEach(p => {
                    const b = getCoords(p.bbox);
                    ctx.strokeStyle = "#00FF00";
                    ctx.lineWidth = 4;
                    ctx.strokeRect(b.x, b.y, b.w, b.h);

                    if (cX > b.x && cX < b.x + b.w && cY > b.y && cY < b.y + b.h) {
                        centerObject = p.class.toUpperCase();
                    }
                });
                label.innerText = centerObject || "SCANNING...";
            }
            requestAnimationFrame(renderLoop);
        }

        function handleTouch(e) {
            const touch = e.touches[0];
            const tX = touch.clientX, tY = touch.clientY;
            const threshold = (100 - document.getElementById('sens').value) / 100;
            
            let found = null;
            lastPredictions.forEach(p => {
                const b = getCoords(p.bbox);
                if (tX > b.x && tX < b.x + b.w && tY > b.y && tY < b.y + b.h && p.score >= threshold) {
                    found = p.class.toUpperCase();
                }
            });

            if (found) {
                if (navigator.vibrate) navigator.vibrate([150, 50, 150]);
                const speak = new SpeechSynthesisUtterance(found);
                window.speechSynthesis.speak(speak);
            }
        }

        function savePhoto() {
            // Create a temporary canvas to merge video + drawing
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            const tempCtx = tempCanvas.getContext('2d');

            // 1. Draw Video Frame
            tempCtx.drawImage(video, 0, 0);

            // 2. Draw Bounding Boxes and Labels on top
            lastPredictions.forEach(p => {
                const [x, y, w, h] = p.bbox;
                tempCtx.strokeStyle = "#00FF00";
                tempCtx.lineWidth = 5;
                tempCtx.strokeRect(x, y, w, h);
                
                tempCtx.fillStyle = "#00FF00";
                tempCtx.font = "bold 40px Arial";
                tempCtx.fillText(p.class.toUpperCase(), x, y > 40 ? y - 10 : y + 40);
            });

            // 3. Download
            const link = document.createElement('a');
            link.download = 'detection_' + Date.now() + '.png';
            link.href = tempCanvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
