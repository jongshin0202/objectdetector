<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Touch & Speak AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; touch-action: none; }
        #video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 80%; z-index: 5; background: transparent; }
        #label-container { position: absolute; top: 10%; width: 100%; text-align: center; color: #00ff00; font-size: 42px; font-weight: bold; z-index: 10; text-shadow: 2px 2px 10px #000; pointer-events: none; }
        
        .controls { position: absolute; bottom: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 20; padding-bottom: 20px; }
        .slider-container { width: 80%; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 15px; text-align: center; }
        input[type=range] { width: 100%; cursor: pointer; }
        
        button { padding: 15px 30px; font-size: 16px; font-weight: bold; border-radius: 50px; border: none; cursor: pointer; background: white; color: black; }
        #startBtn { background: #00ff00; padding: 25px 50px; font-size: 20px; }
    </style>
</head>
<body>

    <div id="label-container">TAP TO START</div>
    <video id="video" autoplay playsinline muted></video>
    
    <div id="overlay" onclick="handleTouch()"></div>
    
    <div class="controls">
        <div id="ui-elements" style="display:none; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px;">
            <div class="slider-container">
                <label>Sensitivity: <span id="sensValue">50</span>%</label><br>
                <input type="range" id="sensitivity" min="1" max="99" value="50" oninput="updateSens(this.value)">
            </div>
            <button id="switchBtn" onclick="switchCamera()">SWITCH CAMERA</button>
        </div>
        <button id="startBtn" onclick="initApp()">START</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const label = document.getElementById('label-container');
        const sensInput = document.getElementById('sensitivity');
        const sensDisp = document.getElementById('sensValue');
        let model = null;
        let currentStream = null;
        let facingMode = 'environment';
        let threshold = 0.5;

        function updateSens(val) {
            sensDisp.innerText = val;
            threshold = val / 100;
        }

        async function initApp() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('ui-elements').style.display = 'flex';
            label.innerText = "LOADING AI...";
            try {
                model = await mobilenet.load();
                await startCamera();
                label.innerText = "TOUCH SCREEN";
            } catch (e) {
                label.innerText = "ERROR: " + e.message;
            }
        }

        async function startCamera() {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            try {
                const constraints = {
                    video: { facingMode: { ideal: facingMode } },
                    audio: false
                };
                currentStream = await navigator.mediaDevices.getUserMedia(constraints)
                    .catch(() => navigator.mediaDevices.getUserMedia({ video: true }));
                
                video.srcObject = currentStream;
                video.onloadedmetadata = () => video.play();
            } catch (e) {
                alert("Camera failed: " + e.message);
            }
        }

        async function switchCamera() {
            facingMode = (facingMode === 'environment') ? 'user' : 'environment';
            await startCamera();
        }

        async function handleTouch() {
            if (!model) return;

            // Vibrate (100ms)
            if (navigator.vibrate) navigator.vibrate(100);

            const predictions = await model.classify(video);
            
            if (predictions.length > 0) {
                const topResult = predictions[0];
                
                // Only act if probability is higher than our threshold
                if (topResult.probability >= threshold) {
                    const resultText = topResult.className.split(',')[0].toUpperCase();
                    label.innerText = resultText;

                    const utterance = new SpeechSynthesisUtterance(resultText);
                    window.speechSynthesis.speak(utterance);
                } else {
                    label.innerText = "UNSURE...";
                }
            }
        }
    </script>
</body>
</html>
