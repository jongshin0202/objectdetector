<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>AI Precision Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        #video { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        #touch-zone { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        #label-container { position: absolute; top: 8%; width: 100%; text-align: center; color: #00ff00; font-size: 34px; font-weight: bold; z-index: 15; text-shadow: 2px 2px 10px #000; pointer-events: none; }
        
        /* Initial Screen */
        #init-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; }
        #startBtn { padding: 30px 50px; font-size: 22px; font-weight: bold; background: #00ff00; border: none; border-radius: 15px; color: #000; }
        
        /* Bottom Controls */
        #controls { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); z-index: 20; padding: 20px 0; display: none; flex-direction: column; align-items: center; gap: 15px; }
        .slider-box { width: 85%; display: flex; flex-direction: column; align-items: center; }
        input[type=range] { width: 100%; height: 40px; margin: 10px 0; -webkit-appearance: none; background: #444; border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 30px; width: 30px; border-radius: 50%; background: #00ff00; }
        #switchBtn { padding: 10px 20px; border-radius: 8px; border: none; background: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <div id="init-screen">
        <button id="startBtn" onclick="initApp()">Start Object Detection</button>
    </div>

    <div id="label-container">LOADING...</div>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="touch-zone"></div>
    
    <div id="controls">
        <button id="switchBtn" onclick="switchCamera()">SWITCH CAMERA</button>
        <div class="slider-box">
            <label>Sensitivity: <span id="sVal">50</span>%</label>
            <input type="range" id="sens" min="1" max="99" value="50" oninput="updateSensitivity(this.value)">
        </div>
    </div>

    <script>
        let model, stream, facing = 'environment', lastPredictions = [];
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const label = document.getElementById('label-container');

        function updateSensitivity(val) {
            document.getElementById('sVal').innerText = val;
        }

        async function initApp() {
            document.getElementById('init-screen').style.display = 'none';
            document.getElementById('controls').style.display = 'flex';
            label.innerText = "LOADING AI...";
            model = await cocoSsd.load();
            await startCam();
            document.getElementById('touch-zone').addEventListener('touchstart', handleTouch);
            renderLoop();
        }

        async function startCam() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: facing } } })
                    .catch(() => navigator.mediaDevices.getUserMedia({ video: true }));
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    canvas.width = canvas.clientWidth;
                    canvas.height = canvas.clientHeight;
                };
            } catch(e) { alert("Camera Error"); }
        }

        function switchCamera() {
            facing = (facing === 'environment') ? 'user' : 'environment';
            startCam();
        }

        function getCoords(bbox) {
            const [x, y, w, h] = bbox;
            const vW = video.videoWidth, vH = video.videoHeight;
            const cW = canvas.width, cH = canvas.height;
            const vR = vW / vH, cR = cW / cH;
            let xO = 0, yO = 0, rW = cW, rH = cH;
            if (vR > cR) { rW = cH * vR; xO = (cW - rW) / 2; } 
            else { rH = cW / vR; yO = (cH - rH) / 2; }
            return { x: (x / vW) * rW + xO, y: (y / vH) * rH + yO, w: (w / vW) * rW, h: (h / vH) * rH };
        }

        async function renderLoop() {
            if (model && video.readyState === 4) {
                lastPredictions = await model.detect(video);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                let centerObject = "SCANNING...";
                const cX = canvas.width / 2, cY = canvas.height / 2;

                lastPredictions.forEach(p => {
                    const box = getCoords(p.bbox);
                    ctx.strokeStyle = "#00FF00";
                    ctx.lineWidth = 4;
                    ctx.strokeRect(box.x, box.y, box.w, box.h);

                    if (cX > box.x && cX < box.x + box.w && cY > box.y && cY < box.y + box.h) {
                        centerObject = p.class.toUpperCase();
                    }
                });
                label.innerText = centerObject;
            }
            requestAnimationFrame(renderLoop);
        }

        function handleTouch(e) {
            const touch = e.touches[0];
            const tX = touch.clientX, tY = touch.clientY;
            const sensThreshold = (100 - document.getElementById('sens').value) / 100;
            
            let found = null;
            lastPredictions.forEach(p => {
                const b = getCoords(p.bbox);
                if (tX > b.x && tX < b.x + b.w && tY > b.y && tY < b.y + b.h && p.score >= sensThreshold) {
                    found = p.class.toUpperCase();
                }
            });

            if (found) {
                if (navigator.vibrate) navigator.vibrate([150, 50, 150]);
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(found));
            }
        }
    </script>
</body>
</html>
