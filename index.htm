<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Object Detector V11</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #video { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; }
        #canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; pointer-events: none; }
        #header { position: absolute; top: 0; width: 100%; text-align: center; background: rgba(0,0,0,0.8); z-index: 10; padding: 15px 0; border-bottom: 2px solid #00ff00; }
        #label-container { color: #00ff00; font-size: 24px; font-weight: bold; }
        #footer { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.85); padding: 15px 0 30px 0; z-index: 100; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .row { display: flex; gap: 10px; margin-bottom: 5px; }
        .btn { padding: 12px 20px; font-size: 14px; background: #00ff00; color: #000; border: none; border-radius: 8px; font-weight: bold; }
        #voiceBtn { background: #ffcc00; }
        .slider-box { width: 80%; text-align: center; font-size: 12px; color: #aaa; }
        input[type=range] { width: 100%; accent-color: #00ff00; margin-top: 5px; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div id="header"><div id="label-container">STANDBY</div></div>

    <div id="footer">
        <button class="btn" id="startBtn" onclick="init()" style="width: 80%; font-size: 18px;">🚀 START AI SYSTEM</button>
        
        <div class="row" id="mainControls" style="display:none;">
            <button class="btn" onclick="savePhoto()">📷 SAVE</button>
            <button class="btn" onclick="cycleCameras()">🔄 CAM</button>
            <button class="btn" id="voiceBtn" onclick="toggleVoice()">🔊 VOICE: OFF</button>
        </div>

        <div class="slider-box" id="sliderUI" style="display:none;">
            Sensitivity: <span id="conf-val">65</span>% (Higher = More Accurate)
            <input type="range" min="10" max="95" value="65" oninput="updateConf(this.value)">
        </div>
        <div style="font-size: 10px; color: #555;" id="log-text">Ready.</div>
    </div>

    <script>
        const log = (msg) => document.getElementById('log-text').innerText = msg;
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let detector, currentStream, voiceEnabled = false, minConf = 0.65, videoDevices = [], devIdx = 0, lastAnnounced = "";

        async function init() {
            log("Opening camera...");
            const devices = await navigator.mediaDevices.enumerateDevices();
            videoDevices = devices.filter(d => d.kind === 'videoinput');
            await startCamera(videoDevices[devIdx]?.deviceId);

            log("Downloading AI Brain... Please wait 10s...");
            document.getElementById('label-container').innerText = "DOWNLOADING...";
            detector = await cocoSsd.load();
            
            log("System Active!");
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('mainControls').style.display = 'flex';
            document.getElementById('sliderUI').style.display = 'block';
            detect();
        }

        async function startCamera(id) {
            if (currentStream) currentStream.getTracks().forEach(t => t.stop());
            currentStream = await navigator.mediaDevices.getUserMedia({ video: id ? { deviceId: { exact: id } } : { facingMode: 'environment' } });
            video.srcObject = currentStream;
            await video.play();
        }

        function cycleCameras() { devIdx = (devIdx + 1) % videoDevices.length; startCamera(videoDevices[devIdx].deviceId); }
        function updateConf(val) { minConf = val / 100; document.getElementById('conf-val').innerText = val; }
        function toggleVoice() { voiceEnabled = !voiceEnabled; document.getElementById('voiceBtn').innerText = voiceEnabled ? "🔊 VOICE: ON" : "🔊 VOICE: OFF"; }

        async function detect() {
            if (!detector || video.readyState !== 4) { requestAnimationFrame(detect); return; }
            const predictions = await detector.detect(video);
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const filtered = predictions.filter(p => p.score >= minConf);
            if (filtered.length > 0) {
                const top = filtered[0];
                const name = top.class.toUpperCase();
                document.getElementById('label-container').innerText = `${name} (${Math.round(top.score*100)}%)`;
                ctx.strokeStyle = "#00ff00"; ctx.lineWidth = 8; ctx.strokeRect(...top.bbox);
                if (voiceEnabled && name !== lastAnnounced) {
                    window.speechSynthesis.cancel();
                    window.speechSynthesis.speak(new SpeechSynthesisUtterance(name));
                    lastAnnounced = name;
                }
            } else { document.getElementById('label-container').innerText = "SCANNING..."; }
            requestAnimationFrame(detect);
        }

        function savePhoto() {
            const temp = document.createElement('canvas');
            temp.width = video.videoWidth; temp.height = video.videoHeight;
            const tCtx = temp.getContext('2d');
            tCtx.drawImage(video, 0, 0);
            tCtx.drawImage(canvas, 0, 0);
            const a = document.createElement('a');
            a.download = `AI_Detect_${Date.now()}.png`;
            a.href = temp.toDataURL();
            a.click();
        }
    </script>
</body>
</html>
