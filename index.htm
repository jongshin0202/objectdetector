<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice AI Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #label-container { position: absolute; top: 10%; width: 100%; text-align: center; color: #00ff00; font-size: 40px; font-weight: bold; z-index: 10; text-shadow: 3px 3px 5px #000; }
        #btn { position: absolute; z-index: 100; padding: 20px; font-size: 20px; background: #00ff00; color: black; border: none; border-radius: 10px; cursor: pointer; }
        #debug { position: absolute; bottom: 10px; width: 100%; text-align: center; font-size: 12px; z-index: 10; background: rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <button id="btn" onclick="startApp()">CLICK TO START CAMERA</button>
    <div id="label-container">Camera Offline</div>
    <video id="video" autoplay playsinline muted></video>
    <div id="debug">Status: <span id="log-text">Waiting for user...</span></div>

    <script>
        const log = (msg) => document.getElementById('log-text').innerText = msg;
        const label = document.getElementById('label-container');
        const btn = document.getElementById('btn');

        async function startApp() {
            btn.style.display = 'none'; // Hide button after click
            try {
                log("Requesting Camera...");
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                
                const videoEl = document.getElementById('video');
                videoEl.srcObject = stream;
                
                // Ensure video actually plays
                await videoEl.play();

                log("Loading AI Model...");
                const model = await mobilenet.load();
                log("Running!");

                async function detect() {
                    const predictions = await model.classify(videoEl);
                    if (predictions.length > 0) {
                        label.innerText = predictions[0].className.split(',')[0].toUpperCase();
                    }
                    requestAnimationFrame(detect);
                }
                detect();
            } catch (e) {
                log("Error: " + e.message);
                btn.style.display = 'block';
                btn.innerText = "Retry Camera Access";
            }
        }
    </script>
</body>
</html>
