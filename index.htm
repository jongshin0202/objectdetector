<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert AI Object Detector</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #video { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; }
        #label-container { position: absolute; top: 8%; width: 100%; text-align: center; color: #00ff00; font-size: 36px; font-weight: bold; z-index: 10; text-shadow: 2px 2px 8px #000; pointer-events: none; }
        #controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 100; }
        .btn { padding: 15px 25px; font-size: 16px; background: #00ff00; color: #000; border: none; border-radius: 30px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,255,0,0.3); }
        #debug { position: absolute; bottom: 5px; width: 100%; text-align: center; font-size: 10px; color: #aaa; z-index: 10; }
    </style>
</head>
<body>
    <div id="label-container">TAP START</div>
    <video id="video" autoplay playsinline muted></video>
    
    <div id="controls">
        <button class="btn" id="startBtn" onclick="init()">START CAMERA</button>
        <button class="btn" id="switchBtn" onclick="switchCamera()" style="display:none;">SWITCH CAMERA</button>
    </div>

    <div id="debug">Logs: <span id="log-text">Ready.</span></div>

    <script>
        const log = (msg) => document.getElementById('log-text').innerText = msg;
        const label = document.getElementById('label-container');
        const video = document.getElementById('video');
        let currentStream;
        let useFrontCamera = false;
        let model;

        async function init() {
            document.getElementById('startBtn').style.display = 'none';
            try {
                log("Downloading AI Model...");
                label.innerText = "LOADING AI...";
                model = await mobilenet.load();
                
                await startCamera();
                document.getElementById('switchBtn').style.display = 'block';
                
                log("AI Running!");
                predict();
            } catch (e) {
                log("ERROR: " + e.message);
                label.innerText = "RETRY NEEDED";
            }
        }

        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: { facingMode: useFrontCamera ? "user" : "environment" },
                audio: false
            };

            log(`Starting ${useFrontCamera ? 'Front' : 'Back'} Camera...`);
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = currentStream;
            
            return new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    resolve();
                };
            });
        }

        async function switchCamera() {
            useFrontCamera = !useFrontCamera;
            await startCamera();
        }

        async function predict() {
            if (model && video.readyState === 4) {
                const predictions = await model.classify(video);
                if (predictions.length > 0) {
                    label.innerText = predictions[0].className.split(',')[0].toUpperCase();
                }
            }
            requestAnimationFrame(predict);
        }
    </script>
</body>
</html>
